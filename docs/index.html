<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pluggo – Deel je laadpaal met de buurt</title>
  <style>
    :root {
      --primary: #0B6B3A;
      --text: #1A1F1C;
      --muted: #5C6B63;
      --border: #E4EBE7;
      --bg: #FAFBFA;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.6;
    }
    .container {
      max-width: 680px;
      margin: 0 auto;
      padding: 80px 24px;
      text-align: center;
    }
    .logo-mark {
      width: 72px;
      height: 72px;
      background: var(--primary);
      border-radius: 20px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 700;
      font-size: 36px;
      margin-bottom: 24px;
      box-shadow: 0 10px 30px rgba(11, 107, 58, 0.2);
    }
    h1 {
      font-size: 40px;
      font-weight: 700;
      margin: 0 0 12px;
      letter-spacing: -0.02em;
    }
    .tagline {
      font-size: 18px;
      color: var(--muted);
      margin: 0 0 48px;
    }
    .links {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .link-card {
      display: block;
      padding: 16px 24px;
      background: white;
      border: 1px solid var(--border);
      border-radius: 12px;
      text-decoration: none;
      color: var(--text);
      font-weight: 600;
      transition: border-color 0.15s;
    }
    .link-card:hover {
      border-color: var(--primary);
    }
    footer {
      margin-top: 64px;
      color: var(--muted);
      font-size: 14px;
    }
    footer a {
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo-mark">⚡</div>
    <h1>Pluggo</h1>
    <p class="tagline">Deel je laadpaal met de buurt.</p>

    <div class="links">
      <a class="link-card" href="./privacy.html">Privacybeleid</a>
      <a class="link-card" href="./terms.html">Algemene voorwaarden</a>
    </div>

    <footer>
      <p>Vragen? <a href="mailto:rakawakka@gmail.com">rakawakka@gmail.com</a></p>
    </footer>
  </div>
</body>
</html>
