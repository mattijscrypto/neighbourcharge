name: neighbourcharge
description: A new Flutter project for NeighbourCharge.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  google_maps_flutter: ^2.5.0
  supabase_flutter: ^2.5.0
  http: ^1.2.0
  google_fonts: ^6.2.1
  image_picker: ^1.0.7
  url_launcher: ^6.2.5
  geolocator: ^11.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
    - assets/splash/

# -----------------------------------------------------------
# App-icoon config — genereert iOS + Android icons uit icon.png
# Draai: flutter pub run flutter_launcher_icons
# -----------------------------------------------------------
flutter_launcher_icons:
  ios: true
  android: true
  image_path: "assets/icon/icon.png"
  remove_alpha_ios: true
  # Android adaptive icons (Android 8+): vlakke groene achtergrond
  # met alleen de bliksem als voorgrond
  adaptive_icon_background: "#00A87E"
  adaptive_icon_foreground: "assets/icon/icon_foreground.png"
  min_sdk_android: 21

# -----------------------------------------------------------
# Launch screen (splash) config
# Draai: flutter pub run flutter_native_splash:create
# -----------------------------------------------------------
flutter_native_splash:
  color: "#00A87E"
  image: assets/splash/splash.png
  android_12:
    color: "#00A87E"
    image: assets/splash/splash.png
  ios: true
  android: true
  web: false
